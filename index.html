function deadlineInfo(d){
  if(!d)return null;
  const diff=Math.ceil((new Date(d)-new Date())/86400000);
  if(diff<0) return{text:`Просрочено ${Math.abs(diff)} дн.`,u:"overdue"};
  if(diff===0)return{text:"Сегодня!",u:"today"};
  if(diff<=2) return{text:`${diff} дн.`,u:"soon"};
  return{text:`${diff} дн.`,u:"ok"};
}
const UC={overdue:"#C0392B",today:"#D4956A",soon:"#C4884A",ok:"#7CAF8E"};

function calcProgress(tasks){
  const a=tasks.filter(t=>t.status!=="archived");
  if(!a.length)return 0;
  return Math.round(a.filter(t=>t.status==="done").length/a.length*100);
}

function getTodayItems(projects){
  const items=[];
  projects.forEach(proj=>
    proj.tasks.filter(t=>t.status==="in_progress").forEach(task=>
      task.subtasks.filter(s=>!s.done).forEach(sub=>items.push({proj,task,sub}))
    )
  );
  items.sort((a,b)=>{
    const da=a.sub.deadline||a.task.deadline,db=b.sub.deadline||b.task.deadline;
    if(da&&db)return new Date(da)-new Date(db);
    return da?-1:db?1:0;
  });
  return items;
}

function getNextStep(project){
  const ip=project.tasks.find(t=>t.status==="in_progress");
  if(ip){const s=ip.subtasks.find(s=>!s.done);return s?`${ip.title} → ${s.title}`:ip.title;}
  const td=project.tasks.find(t=>t.status==="todo");
  return td?td.title:"Все задачи выполнены 🎉";
}

function useIsMobile(){

    const fn=()=>setMob(window.innerWidth<=768);
    window.addEventListener("resize",fn);

  },[]);
  return mob;
}

function Editable({value,onSave,style,multiline,placeholder}){
  const[editing,setEditing]=React.useState(false);
  const[val,setVal]=React.useState(value);
  const ref=React.useRef();
  React.useEffect(()=>{if(editing&&ref.current)ref.current.focus();},[editing]);
  if(!editing)return(
    <span style={{...style,cursor:"text",display:"block"}} onClick={()=>{setVal(value);setEditing(true);}}>
      {value||<span style={{opacity:.35}}>{placeholder||"—"}</span>}
    </span>
  );
  const done=()=>{if(val.trim())onSave(val.trim());setEditing(false);};
  const p={ref,value:val,onChange:e=>setVal(e.target.value),onBlur:done,
    onKeyDown:e=>{if(e.key==="Enter"&&!multiline)done();if(e.key==="Escape")setEditing(false);},
    style:{...style,border:"none",borderBottom:"2px solid #C4784A",outline:"none",
           background:"transparent",fontFamily:"inherit",display:"block",width:"100%",resize:"none",boxSizing:"border-box"}};
  return multiline?<textarea rows={3} {...p}/>:<input {...p}/>;
}

function Handle({onDragStart}){
  return<span draggable onDragStart={onDragStart}
    style={{cursor:"grab",color:"#C4B5A0",fontSize:17,padding:"0 8px 0 0",userSelect:"none",flexShrink:0}}

}

function SaveIndicator({status}){
  const map={
    idle:{text:"",color:"transparent"},
    saving:{text:"Сохранение...",color:"#A89070"},
    saved:{text:"✓ Сохранено",color:"#7CAF8E"},
    error:{text:"⚠ Ошибка",color:"#C0392B"},
  };
  const s=map[status]||map.idle;
  return<div style={{padding:"8px 16px",fontSize:11,color:s.color,textAlign:"center",letterSpacing:.5,minHeight:28}}>{s.text}</div>;
}

          );
        })}
        <div style={{borderRadius:14,padding:"22px 20px",border:"2px dashed #C4B5A0",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#A89070",gap:8,minHeight:140}} onClick={()=>{setModal("project");setForm({color:PALETTE[0],emoji:"📌"});}}>
          <span style={{fontSize:28}}>+</span><span>Новый проект</span>
        </div>
      </div>
    </div>
  );

  // ── Project detail ──
  const ProjectPage=proj&&!tid&&(
    <div style={{maxWidth:700,margin:"0 auto",padding:isMobile?"20px 16px 100px":"40px 40px 100px"}}>
      <button style={{background:"none",border:"none",color:"#8B7355",cursor:"pointer",fontSize:13,padding:0,fontFamily:"inherit",marginBottom:20,opacity:.8}} onClick={()=>{setView("projects");setPid(null);}}>← Проекты</button>
      <div style={{marginBottom:28}}>
        <div style={{display:"flex",gap:16,alignItems:"flex-start"}}>
          <span style={{fontSize:44,lineHeight:1}}>{proj.emoji}</span>
          <div style={{flex:1}}>
            <Editable value={proj.title} style={{fontSize:isMobile?22:30,fontWeight:"normal",color:"#2C2418",marginBottom:6,letterSpacing:-.5,display:"block"}} onSave={v=>patchProj(pid,{title:v})}/>
            <Editable value={proj.why} style={{fontSize:14,color:"#7A6548",lineHeight:1.6,display:"block"}} placeholder="Добавь цель..." multiline onSave={v=>patchProj(pid,{why:v})}/>
          </div>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16}}>
        <div style={{flex:1,height:10,background:"#EAE0D0",borderRadius:6,overflow:"hidden"}}><div style={{height:"100%",borderRadius:6,transition:"width .4s",width:`${calcProgress(proj.tasks)}%`,background:proj.color}}/></div>
        <span style={{fontSize:20,fontWeight:"bold",color:proj.color,minWidth:44}}>{calcProgress(proj.tasks)}%</span>
      </div>
      <div style={{background:"#F8F2E8",borderRadius:8,padding:"14px 20px",marginBottom:28,display:"flex",gap:12,alignItems:"center",borderLeft:`4px solid ${proj.color}`}}>
        <span style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:"#A89070",flexShrink:0}}>Следующий шаг</span>
        <span style={{fontSize:14,fontWeight:"bold"}}>{getNextStep(proj)}</span>
      </div>
      <h2 style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:"#A89070",marginBottom:14,fontWeight:"normal"}}>Задачи</h2>
      <div onDragOver={e=>e.preventDefault()} onDrop={()=>tDrop(pid)}>
        {proj.tasks.filter(t=>["in_progress","todo"].includes(t.status)).map(t=>{
          const ri=proj.tasks.indexOf(t);
          const dl=deadlineInfo(t.deadline);
          const done=t.subtasks.filter(s=>s.done).length;
          const isT=dragType==="task"&&dragTgt===ri;
          return(
            <div key={t.id} onDragOver={e=>tDragOver(e,ri)}
              style={{display:"flex",alignItems:"center",gap:10,padding:"14px 16px",background:"#fff",borderRadius:10,marginBottom:8,boxShadow:"0 1px 6px rgba(44,36,24,.05)",...(isT?{outline:"2px dashed #C4784A",outlineOffset:2}:{})}}>
              {!isMobile&&<Handle onDragStart={e=>tDragStart(e,ri)}/>}
              <div style={{width:10,height:10,borderRadius:"50%",flexShrink:0,background:t.status==="in_progress"?proj.color:"#C4B5A0"}}/>
              <div style={{flex:1,cursor:"pointer"}} onClick={()=>setTid(t.id)}>
                <div style={{fontSize:15,fontWeight:"bold"}}>{t.title}</div>
                {t.why&&<div style={{fontSize:12,color:"#A89070",marginTop:2}}>{t.why}</div>}
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,cursor:"pointer"}} onClick={()=>setTid(t.id)}>
                {dl&&<span style={{fontSize:11,fontWeight:"bold",padding:"3px 8px",borderRadius:20,background:UC[dl.u]+"22",color:UC[dl.u]}}>{dl.text}</span>}
                <span style={{fontSize:12,color:"#A89070"}}>{done}/{t.subtasks.length}</span>
              </div>
            </div>
          );
        })}
      </div>
      {proj.tasks.filter(t=>["in_progress","todo"].includes(t.status)).length===0&&<p style={{fontSize:14,color:"#A89070"}}>Нет активных задач.</p>}
      <button style={{width:"100%",marginTop:12,padding:"12px",background:"none",border:"2px dashed #C4B5A0",borderRadius:10,color:"#A89070",cursor:"pointer",fontSize:13,fontFamily:"inherit"}} onClick={()=>{setModal("task");setForm({});}}>+ Добавить задачу</button>
      {proj.tasks.some(t=>t.status==="done"||t.status==="archived")&&(
        <div style={{marginTop:32}}>
          <button style={{background:"none",border:"none",color:"#A89070",cursor:"pointer",fontSize:13,fontFamily:"inherit",padding:0}} onClick={()=>setShowArchive(!showArchive)}>
            {showArchive?"▾":"▸"} Архив ({proj.tasks.filter(t=>t.status==="done"||t.status==="archived").length})
          </button>
          {showArchive&&(
            <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:8}}>
              {proj.tasks.filter(t=>t.status==="done"||t.status==="archived").map(t=>(
                <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"#F8F2E8",borderRadius:8}}>
                  <span style={{fontSize:16,color:"#7CAF8E"}}>{t.status==="done"?"✓":"📦"}</span>
                  <span style={{flex:1,fontSize:14,color:"#8B7355",textDecoration:"line-through",opacity:.7}}>{t.title}</span>
                  <button style={{background:"none",border:"1px solid #C4B5A0",borderRadius:6,color:"#8B7355",padding:"4px 10px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}} onClick={()=>patchTask(pid,t.id,{status:"todo"})}>Вернуть</button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
      <div style={{marginTop:48,borderTop:"1px solid #EAE0D0",paddingTop:20}}>
        <button style={{padding:"10px 18px",background:"none",border:"1.5px solid #C0392B",borderRadius:8,color:"#C0392B",cursor:"pointer",fontSize:13,fontFamily:"inherit"}} onClick={()=>delProj(pid)}>Удалить проект</button>
      </div>
    </div>
  );

  // ── Task detail ──
  const TaskPage=proj&&tid&&task&&(
    <div style={{maxWidth:700,margin:"0 auto",padding:isMobile?"20px 16px 100px":"40px 40px 100px"}}>
      <button style={{background:"none",border:"none",color:"#8B7355",cursor:"pointer",fontSize:13,padding:0,fontFamily:"inherit",marginBottom:20,opacity:.8}} onClick={()=>setTid(null)}>← {proj.title}</button>
      <div style={{marginBottom:28}}>
        <Editable value={task.title} style={{fontSize:isMobile?22:30,fontWeight:"normal",color:"#2C2418",marginBottom:6,letterSpacing:-.5,display:"block"}} onSave={v=>patchTask(pid,tid,{title:v})}/>
        <Editable value={task.why} style={{fontSize:14,color:"#7A6548",lineHeight:1.6,display:"block"}} placeholder="Добавь «зачем»..." multiline onSave={v=>patchTask(pid,tid,{why:v})}/>
      </div>
      <div style={{display:"flex",gap:isMobile?16:32,marginBottom:24,flexWrap:"wrap",flexDirection:isMobile?"column":"row"}}>
        <div>
          <div style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:"#A89070",marginBottom:10,display:"block"}}>Статус</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {[["todo","Не начато"],["in_progress","В процессе"],["done","Готово"]].map(([s,l])=>(
              <button key={s}
                style={{padding:"7px 14px",borderRadius:20,cursor:"pointer",fontSize:12,fontFamily:"inherit",
                  background:task.status===s?proj.color:"transparent",
                  color:task.status===s?"#fff":"#8B7355",
                  border:`2px solid ${task.status===s?proj.color:"#C4B5A0"}`}}
                onClick={()=>patchTask(pid,tid,{status:s})}>{l}</button>
            ))}
          </div>
        </div>
        <div>
          <div style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:"#A89070",marginBottom:10,display:"block"}}>Дедлайн</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <input type="date" style={{padding:"7px 10px",border:"1.5px solid #D8CCBA",borderRadius:8,fontSize:13,background:"#fff",color:"#2C2418",outline:"none"}} value={task.deadline||""} onChange={e=>patchTask(pid,tid,{deadline:e.target.value})}/>
            {(()=>{const dl=deadlineInfo(task.deadline);return dl?<span style={{fontSize:11,fontWeight:"bold",padding:"3px 8px",borderRadius:20,background:UC[dl.u]+"22",color:UC[dl.u]}}>{dl.text}</span>:null;})()}
          </div>
        </div>
      </div>
      <div style={{background:"#FDFAF4",borderRadius:10,padding:"16px 18px",marginBottom:24,border:"1px solid #EAE0D0"}}>
        <div style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:"#A89070",marginBottom:8}}>Заметки</div>
        <Editable value={task.notes} style={{fontSize:14,color:"#5C4A2A",lineHeight:1.6,marginTop:8,width:"100%",display:"block"}} placeholder="Добавь заметку, ссылку или контакт..." multiline onSave={v=>patchTask(pid,tid,{notes:v})}/>
      </div>
      <div style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:"#A89070",marginBottom:10}}>Шаги</div>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:10}} onDragOver={e=>e.preventDefault()} onDrop={()=>sDrop(pid,tid)}>
        {task.subtasks.map((sub,idx)=>{
          const dl=deadlineInfo(sub.deadline);
          const isT=dragType==="sub"&&dragTgt===idx;
          return(
            <div key={sub.id} onDragOver={e=>sDragOver(e,idx)}
              style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 14px",
                background:sub.done?"#F8F8F4":"#fff",borderRadius:8,border:"1px solid #EAE0D0",
                ...(isT?{outline:"2px dashed #C4784A",outlineOffset:2}:{})}}>
              {!isMobile&&<Handle onDragStart={e=>sDragStart(e,idx)}/>}
              <div style={{width:22,height:22,borderRadius:6,flexShrink:0,marginTop:2,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",border:`2px solid ${sub.done?proj.color:"#C4B5A0"}`,background:sub.done?proj.color:"transparent"}} onClick={()=>toggleSub(pid,tid,sub.id)}>
                {sub.done&&<span style={{color:"#fff",fontSize:13,fontWeight:"bold"}}>✓</span>}
              </div>
              <div style={{flex:1}}>
                <Editable value={sub.title} style={{fontSize:14,color:"#2C2418",lineHeight:1.4,...(sub.done?{textDecoration:"line-through",opacity:.45}:{})}} onSave={v=>patchSub(pid,tid,sub.id,{title:v})}/>
                <div style={{display:"flex",alignItems:"center",gap:6,marginTop:5,flexWrap:"wrap"}}>
                  <span style={{fontSize:11,opacity:.4}}>📅</span>
                  <input type="date" style={{padding:"3px 8px",border:"1px solid #D8CCBA",borderRadius:6,fontSize:12,background:"transparent",color:"#5C4A2A",outline:"none"}} value={sub.deadline||""} onChange={e=>patchSub(pid,tid,sub.id,{deadline:e.target.value})}/>
                  {dl&&<span style={{fontSize:11,fontWeight:"bold",padding:"3px 8px",borderRadius:20,background:UC[dl.u]+"22",color:UC[dl.u]}}>{dl.text}</span>}
                </div>
              </div>
              <button style={{background:"none",border:"none",color:"#C4B5A0",cursor:"pointer",fontSize:14,padding:"2px 4px"}} onClick={()=>delSub(pid,tid,sub.id)}>✕</button>
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:10,marginTop:12,marginBottom:28}}>
        <input style={{flex:1,padding:"10px 14px",border:"1.5px solid #D8CCBA",borderRadius:8,fontSize:14,background:"#fff",color:"#2C2418",outline:"none"}} placeholder="Добавить шаг..." value={newSub} onChange={e=>setNewSub(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addSubtask(pid,tid);}}/>
        <button style={{padding:"8px 16px",border:"none",borderRadius:7,cursor:"pointer",fontSize:13,color:"#fff",fontFamily:"inherit",background:proj.color}} onClick={()=>addSubtask(pid,tid)}>Добавить</button>
      </div>
      <div style={{borderTop:"1px solid #EAE0D0",paddingTop:20,display:"flex",gap:12,flexWrap:"wrap"}}>
        <button style={{padding:"10px 18px",background:"#F0E8D8",border:"none",borderRadius:8,color:"#8B7355",cursor:"pointer",fontSize:13}} onClick={()=>archiveTask(pid,tid)}>📦 В архив</button>
        <button style={{padding:"10px 18px",background:"none",border:"1.5px solid #C0392B",borderRadius:8,color:"#C0392B",cursor:"pointer",fontSize:13,fontFamily:"inherit"}} onClick={()=>delTask(pid,tid)}>Удалить задачу</button>
      </div>
    </div>
  );

  const currentPage=()=>{
    if(view==="today")return TodayPage;
    if(view==="projects"&&!pid)return ProjectsPage;
    if(view==="project"&&proj&&!tid)return ProjectPage;
    if(view==="project"&&proj&&tid&&task)return TaskPage;
    return TodayPage;
  };

  return(
    <div style={{display:"flex",height:"100vh",background:"#F5F0E8",fontFamily:"Georgia,'Times New Roman',serif",color:"#2C2418",overflow:"hidden"}}>

      {/* Desktop sidebar */}
      {!isMobile&&(
        <aside style={{width:224,background:"#221C12",color:"#E8D5B7",display:"flex",flexDirection:"column",padding:"24px 0",flexShrink:0}}>
          <SidebarContent projects={projects} pid={pid} view={view} setView={setView} setPid={setPid} setTid={setTid} setModal={setModal} setForm={setForm} saveStatus={saveStatus} isMobile={false}/>
        </aside>
      )}

      {/* Mobile drawer overlay */}
      {isMobile&&drawerOpen&&(
        <div style={{position:"fixed",inset:0,zIndex:200,display:"flex"}}>
          <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.5)"}} onClick={()=>setDrawerOpen(false)}/>
          <aside style={{position:"relative",width:280,background:"#221C12",color:"#E8D5B7",display:"flex",flexDirection:"column",padding:"24px 0",zIndex:201,height:"100%",overflowY:"auto"}}>
            <SidebarContent projects={projects} pid={pid} view={view} setView={setView} setPid={setPid} setTid={setTid} setModal={setModal} setForm={setForm} saveStatus={saveStatus} isMobile={true} onClose={()=>setDrawerOpen(false)}/>
          </aside>
        </div>
      )}

      {/* Main content */}
      <main style={{flex:1,overflowY:"auto",paddingBottom:isMobile?70:0}}>
        {currentPage()}
      </main>

      {/* Mobile tab bar */}
      {isMobile&&(
        <nav style={{position:"fixed",bottom:0,left:0,right:0,height:64,background:"#221C12",display:"flex",alignItems:"center",justifyContent:"space-around",zIndex:100,borderTop:"1px solid #3A2E1E"}}>
          {[
            {id:"today",icon:"☀️",label:"Сегодня",action:()=>{setView("today");setPid(null);setTid(null);}},
            {id:"projects",icon:"⬡",label:"Проекты",action:()=>{setView("projects");setPid(null);setTid(null);}},
            {id:"menu",icon:"☰",label:"Меню",action:()=>setDrawerOpen(true)},
          ].map(btn=>{
            const isActive=(btn.id==="today"&&view==="today"&&!pid)||(btn.id==="projects"&&(view==="projects"||view==="project")&&!drawerOpen)||(btn.id==="menu"&&drawerOpen);
            return(
              <button key={btn.id} onClick={btn.action}
                style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",flex:1,padding:"8px 0",color:isActive?"#C4784A":"#6A5530"}}>
                <span style={{fontSize:20}}>{btn.icon}</span>
                <span style={{fontSize:10,letterSpacing:.5}}>{btn.label}</span>
              </button>
            );
          })}
        </nav>
      )}

      {/* Modals */}
      {modal==="project"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(34,28,18,.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}} onClick={()=>setModal(null)}>
          <div style={{background:"#FAF5EC",borderRadius:16,padding:32,width:420,maxWidth:"92vw",boxShadow:"0 20px 60px rgba(34,28,18,.3)"}} onClick={e=>e.stopPropagation()}>
            <h2 style={{fontSize:22,marginBottom:20,fontWeight:"normal",color:"#2C2418"}}>Новый проект</h2>
            <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
              {EMOJIS.map(e=><span key={e} style={{fontSize:22,cursor:"pointer",padding:6,borderRadius:8,border:`2px solid ${form.emoji===e?"#C4784A":"transparent"}`,background:form.emoji===e?"#FFF0E0":"transparent"}} onClick={()=>setForm({...form,emoji:e})}>{e}</span>)}
            </div>
            <input style={{width:"100%",padding:"11px 14px",border:"1.5px solid #D8CCBA",borderRadius:8,fontSize:15,background:"#fff",color:"#2C2418",marginBottom:12,boxSizing:"border-box",outline:"none"}} placeholder="Название проекта" autoFocus value={form.title||""} onChange={e=>setForm({...form,title:e.target.value})} onKeyDown={e=>{if(e.key==="Enter")addProj();}}/>
            <textarea style={{width:"100%",padding:"11px 14px",border:"1.5px solid #D8CCBA",borderRadius:8,fontSize:15,background:"#fff",color:"#2C2418",marginBottom:16,boxSizing:"border-box",outline:"none",resize:"vertical",minHeight:80}} placeholder="Зачем этот проект?" value={form.why||""} onChange={e=>setForm({...form,why:e.target.value})}/>
            <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
              {PALETTE.map(c=><div key={c} style={{width:26,height:26,borderRadius:"50%",background:c,cursor:"pointer",border:`3px solid ${form.color===c?"#2C2418":"transparent"}`}} onClick={()=>setForm({...form,color:c})}/>)}
            </div>
            <div style={{display:"flex",gap:12,justifyContent:"flex-end"}}>
              <button style={{padding:"10px 20px",background:"none",border:"1.5px solid #C4B5A0",borderRadius:8,color:"#8B7355",cursor:"pointer",fontSize:14,fontFamily:"inherit"}} onClick={()=>setModal(null)}>Отмена</button>
              <button style={{padding:"10px 20px",border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontSize:14,fontFamily:"inherit",background:form.color||PALETTE[0]}} onClick={addProj}>Создать</button>
            </div>
          </div>
        </div>
      )}

      {modal==="task"&&proj&&(
        <div style={{position:"fixed",inset:0,background:"rgba(34,28,18,.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}} onClick={()=>setModal(null)}>
          <div style={{background:"#FAF5EC",borderRadius:16,padding:32,width:420,maxWidth:"92vw",boxShadow:"0 20px 60px rgba(34,28,18,.3)"}} onClick={e=>e.stopPropagation()}>
            <h2 style={{fontSize:22,marginBottom:20,fontWeight:"normal",color:"#2C2418"}}>Новая задача</h2>
            <input style={{width:"100%",padding:"11px 14px",border:"1.5px solid #D8CCBA",borderRadius:8,fontSize:15,background:"#fff",color:"#2C2418",marginBottom:12,boxSizing:"border-box",outline:"none"}} placeholder="Название задачи" autoFocus value={form.title||""} onChange={e=>setForm({...form,title:e.target.value})} onKeyDown={e=>{if(e.key==="Enter")addTask(pid);}}/>
            <textarea style={{width:"100%",padding:"11px 14px",border:"1.5px solid #D8CCBA",borderRadius:8,fontSize:15,background:"#fff",color:"#2C2418",marginBottom:16,boxSizing:"border-box",outline:"none",resize:"vertical",minHeight:80}} placeholder="Зачем эта задача?" value={form.why||""} onChange={e=>setForm({...form,why:e.target.value})}/>
            <label style={{fontSize:12,color:"#8B7355",marginBottom:6,display:"block"}}>Дедлайн (необязательно)</label>
            <input type="date" style={{width:"100%",padding:"11px 14px",border:"1.5px solid #D8CCBA",borderRadius:8,fontSize:15,background:"#fff",color:"#2C2418",marginBottom:20,boxSizing:"border-box",outline:"none"}} value={form.deadline||""} onChange={e=>setForm({...form,deadline:e.target.value})}/>
            <div style={{display:"flex",gap:12,justifyContent:"flex-end"}}>
              <button style={{padding:"10px 20px",background:"none",border:"1.5px solid #C4B5A0",borderRadius:8,color:"#8B7355",cursor:"pointer",fontSize:14,fontFamily:"inherit"}} onClick={()=>setModal(null)}>Отмена</button>
              <button style={{padding:"10px 20px",border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontSize:14,fontFamily:"inherit",background:proj.color}} onClick={()=>addTask(pid)}>Добавить</button>
            </div>
          </div>
        </div>
      )}

      {modal==="confirm"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(34,28,18,.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}} onClick={()=>setModal(null)}>
          <div style={{background:"#FAF5EC",borderRadius:16,padding:32,width:360,maxWidth:"92vw",boxShadow:"0 20px 60px rgba(34,28,18,.3)"}} onClick={e=>e.stopPropagation()}>
            <h2 style={{fontSize:22,marginBottom:16,fontWeight:"normal",color:"#2C2418"}}>Подтвердить</h2>
            <p style={{color:"#5C4A2A",marginBottom:24}}>{confirmMsg}</p>
            <div style={{display:"flex",gap:12,justifyContent:"flex-end"}}>
              <button style={{padding:"10px 20px",background:"none",border:"1.5px solid #C4B5A0",borderRadius:8,color:"#8B7355",cursor:"pointer",fontSize:14,fontFamily:"inherit"}} onClick={()=>setModal(null)}>Отмена</button>
              <button style={{padding:"10px 20px",border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontSize:14,fontFamily:"inherit",background:"#C0392B"}} onClick={()=>{confirmCb();setModal(null);}}>Удалить</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
